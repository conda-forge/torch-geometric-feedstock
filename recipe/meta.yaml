{% set version = "2.7.0" %}

package:
  name: torch-geometric
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/t/torch-geometric/torch_geometric-{{ version }}.tar.gz
  sha256: f9099e4aece1a9f618c84dbaac33a77f43139736698c7e8bddf3301ef1f2e8d4

build:
  noarch: python
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  host:
    - flit-core
    - pip
    - python {{ python_min }}
  run:
    - aiohttp
    - fsspec
    - jinja2
    - numpy
    - psutil
    - pyparsing
    - python >={{ python_min }}
    - pytorch
    - requests
    - tqdm

test:
  imports:
    - torch_geometric
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/pyg-team/pytorch_geometric
  summary: Graph Neural Network Library for PyTorch
  license: MIT
  license_file: LICENSE

extra:
  recipe-maintainers:
    - danielnachun
